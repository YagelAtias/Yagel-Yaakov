server {
    # Listen on port 8080, which is what Cloud Run expects by default.
    listen 8080;
    
    # Serve static files from this directory.
    root /usr/share/nginx/html;
    index index.html;

    # Forward all requests to index.html to support React Router's client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like JS and CSS for better performance.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
