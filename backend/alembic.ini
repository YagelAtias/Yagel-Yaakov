# Alembic configuration file
[alembic]
script_location = alembic
# Keep a concrete default here to avoid ConfigParser interpolation errors.
# The real URL is set dynamically in env.py via get_settings()/DATABASE_URL.
# This value serves only as a safe fallback when reading the INI file.
sqlalchemy.url = sqlite:///../distress_engine.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
